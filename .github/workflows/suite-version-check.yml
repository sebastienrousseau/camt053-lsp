name: Suite version drift check

# Robustness guard for the lockstep-versioned camt053 suite: verifies that every
# sibling package is published at the same version on PyPI / GitHub Releases.
# Fails (and notifies) if the suite drifts. Read-only — no clones, no writes.

on:
  schedule:
    - cron: "0 7 * * 1" # weekly, Monday 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Check suite version sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Check version sync across the suite
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/suite-status.sh
